    // --- Silhouette Generation & Mosaic Layout Algorithm ---
    function generateSilhouetteMask(shapeId, svgPath, customText, fontSize = 80, fontFamily = 'Inter, "Mplus 1p", "Hiragino Kaku Gothic Pro", "Noto Sans JP", sans-serif') {
      return new Promise((resolve) => {
        const size = 100;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        if (!ctx) {
          resolve(Array(size).fill(null).map(() => Array(size).fill(true)));
          return;
        }

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = '#000000';

        if (shapeId === 'japanese_text' || !svgPath) {
          const textToDraw = customText || 'LOVE';
          ctx.font = 'bold ' + fontSize + 'px ' + fontFamily;
          ctx.textBaseline = 'middle';
          ctx.textAlign = 'center';

          const lines = splitTextIntoLines(ctx, textToDraw, 90);
          if (lines.length === 1) {
            ctx.fillText(lines[0], 50, 50);
          } else if (lines.length === 2) {
            ctx.font = 'bold ' + (fontSize * 0.72) + 'px ' + fontFamily;
            ctx.fillText(lines[0], 50, 32);
            ctx.fillText(lines[1], 50, 68);
          } else {
            ctx.font = 'bold ' + (fontSize * 0.52) + 'px ' + fontFamily;
            const step = 80 / (lines.length + 1);
            lines.forEach((line, index) => {
              ctx.fillText(line, 50, 10 + step * (index + 1));
            });
          }
        } else {
          const p = new Path2D(svgPath);
          ctx.fill(p);
        }

        const imgData = ctx.getImageData(0, 0, size, size);
        const data = imgData.data;
        const grid = [];

        for (let y = 0; y < size; y++) {
          const row = [];
          for (let x = 0; x < size; x++) {
            const idx = (y * size + x) * 4;
            const r = data[idx];
            const g = data[idx+1];
            const b = data[idx+2];
            const isDark = (r + g + b) / 3 < 128;
            row.push(isDark);
          }
          grid.push(row);
        }

        resolve(grid);
      });

      function splitTextIntoLines(ctx, textToDraw, maxWidth) {
        if (textToDraw.length <= 4) return [textToDraw];
        const textWidth = ctx.measureText(textToDraw).width;
        if (textWidth <= maxWidth) {
          return [textToDraw];
        } else {
          const midHalf = Math.ceil(textToDraw.length / 2);
          return [textToDraw.slice(0, midHalf), textToDraw.slice(midHalf)];
        }
      }
    }

    function getCoverageRatio(mask, x, y, w, h) {
      const size = mask.length;
      let matches = 0;
      let total = 0;

      const startX = Math.max(0, Math.floor(x));
      const endX = Math.min(size - 1, Math.floor(x + w));
      const startY = Math.max(0, Math.floor(y));
      const endY = Math.min(size - 1, Math.floor(y + h));

      for (let py = startY; py <= endY; py++) {
        for (let px = startX; px <= endX; px++) {
          total++;
          if (mask[py] && mask[py][px]) {
            matches++;
          }
        }
      }

      return total > 0 ? matches / total : 0;
    }

    function calculateMosaicLayout(mask, layoutStyle, density, shapeId) {
      const frames = [];
      const size = 100;
      
      const columns = Math.max(3, Math.min(60, Math.round(density / 3.5)));
      const rows = columns;
      const cellW = size / columns;
      const cellH = size / rows;
      const threshold = (shapeId === 'japanese_text') ? 0.35 : 0.45;

      if (layoutStyle === 'GRID') {
        let count = 0;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < columns; c++) {
            const x = c * cellW;
            const y = r * cellH;
            const coverage = getCoverageRatio(mask, x, y, cellW, cellH);
            if (coverage >= threshold) {
              frames.push({
                id: 'frame-grid-' + r + '-' + c + '-' + (count++),
                x: Math.round(x * 10) / 10,
                y: Math.round(y * 10) / 10,
                width: Math.round((cellW - 1) * 10) / 10,
                height: Math.round((cellH - 1) * 10) / 10,
                imageUrl: null,
                shapeId
              });
            }
          }
        }
      } else if (layoutStyle === 'OFFS_BRICK') {
        let count = 0;
        for (let r = 0; r < rows; r++) {
          const isOffsetRow = r % 2 === 1;
          const colsInRow = isOffsetRow ? columns + 1 : columns;
          
          for (let c = 0; c < colsInRow; c++) {
            let x = c * cellW - (isOffsetRow ? cellW / 2 : 0);
            const y = r * cellH;
            let w = cellW;
            
            if (x < 0) {
              w = cellW + x;
              x = 0;
            }
            if (x + w > size) {
              w = size - x;
            }

            if (w < cellW / 3) continue;

            const coverage = getCoverageRatio(mask, x, y, w, cellH);
            if (coverage >= threshold) {
              frames.push({
                id: 'frame-brick-' + r + '-' + c + '-' + (count++),
                x: Math.round(x * 10) / 10,
                y: Math.round(y * 10) / 10,
                width: Math.round((w - 1.2) * 10) / 10,
                height: Math.round((cellH - 1) * 10) / 10,
                imageUrl: null,
                shapeId
              });
            }
          }
        }
      }

      return frames;
    }

    // --- Main App React Component ---
    function App() {
      const [selectedShape, setSelectedShape] = useState(PRESET_SHAPES[0]);
      const [selectedSubShape, setSelectedSubShape] = useState(SHAPE_SUB_PRESETS[0]);
      const [customText, setCustomText] = useState('LOVE');
      const [layoutStyle, setLayoutStyle] = useState('GRID');
      const [density, setDensity] = useState(25);
      const [frames, setFrames] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [currentPool, setCurrentPool] = useState([]); // ユーザー追加写真プール
      const [bgHue, setBgHue] = useState(210);
      const [bgSat, setBgSat] = useState(16);
      const [bgLight, setBgLight] = useState(95);
      const [canvasBg, setCanvasBg] = useState('#f1f5f9');
      const [canvasAspectRatio, setCanvasAspectRatio] = useState('1:1');
      const [zoomLevel, setZoomLevel] = useState(100);
      const [hoveredFrameId, setHoveredFrameId] = useState(null);
      const [selectedFrameId, setSelectedFrameId] = useState(null);
      const [activeTab, setActiveTab] = useState('template');
      const [successMessage, setSuccessMessage] = useState(null);
      const [appLang, setAppLang] = useState('ja');
      const [tutorialStep, setTutorialStep] = useState(1);

      useEffect(() => {
        setCanvasBg('hsl(' + bgHue + ',' + bgSat + '%,' + bgLight + '%)');
      }, [bgHue, bgSat, bgLight]);

      useEffect(() => {
        let active = true;
        async function recomputeLayout() {
          setIsLoading(true);
          try {
            const isShape = selectedShape.id === 'shape_preset';
            const textVal = customText;
            const pathVal = isShape ? selectedSubShape.svgPath : undefined;
            const effShapeId = isShape ? 'shape_preset' : 'japanese_text';

            const mask = await generateSilhouetteMask(effShapeId, pathVal, textVal);
            if (!active) return;

            const safeDensity = !density || density < 10 ? 10 : Number(density);
            const calculated = calculateMosaicLayout(mask, layoutStyle, safeDensity, effShapeId);
            const matched = calculated.map((newFrame) => {
              const oldFrame = frames.find(f => Math.abs(f.x - newFrame.x) < 2 && Math.abs(f.y - newFrame.y) < 2);
              if (oldFrame && oldFrame.imageUrl) {
                return { ...newFrame, imageUrl: oldFrame.imageUrl };
              }
              return newFrame;
            });

            setFrames(matched);
          } catch (error) {
            console.error(error);
          } finally {
            if (active) setIsLoading(false);
          }
        }
        recomputeLayout();
        return () => { active = false; };
      }, [selectedShape, selectedSubShape, customText, layoutStyle, density]);

      const triggerSuccessToast = (msg) => {
        setSuccessMessage(msg);
        setTimeout(() => setSuccessMessage(null), 4000);
      };

      const handleAutoFillPhotos = () => {
        if (currentPool.length === 0) {
          triggerSuccessToast("❌ プールに写真がありません。先に写真を追加してください。");
          return;
        }
        setFrames(prev => prev.map((frame, i) => {
          const url = currentPool[i % currentPool.length];
          return { ...frame, imageUrl: url };
        }));
        triggerSuccessToast("すべてのフレームに写真が自動充填されました！");
      };

      const handleClearPhotoAssignments = () => {
        setFrames(prev => prev.map(f => ({ ...f, imageUrl: null })));
        triggerSuccessToast("写真の割り当てをクリアしました。");
      };

      const handleShufflePhotos = () => {
        const allocatedUrls = frames.map(f => f.imageUrl).filter(Boolean);
        if (allocatedUrls.length === 0) {
          if (currentPool.length === 0) {
            triggerSuccessToast("❌ プールに写真がありません。先に写真を追加してください。");
            return;
          }
          setFrames(prev => prev.map(f => {
            const rnd = currentPool[Math.floor(Math.random() * currentPool.length)];
            return { ...f, imageUrl: rnd };
          }));
        } else {
          const shuffled = [...allocatedUrls].sort(() => Math.random() - 0.5);
          let index = 0;
          setFrames(prev => prev.map(f => {
            if (f.imageUrl) {
              const nextUrl = shuffled[index % shuffled.length];
              index++;
              return { ...f, imageUrl: nextUrl };
            }
            return f;
          }));
        }
        triggerSuccessToast("割り当て写真を一括シャッフルしました！");
      };

      const loadFrameImage = (frame) => {
        return new Promise((resolve) => {
          if (!frame.imageUrl) {
            resolve({ frameId: frame.id, img: null });
            return;
          }
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = () => resolve({ frameId: frame.id, img });
          img.onerror = () => resolve({ frameId: frame.id, img: null });
          img.src = frame.imageUrl;
        });
      };

      const handleLocalFileSelect = (e) => {
        const files = e.target.files;
        if (!files) return;
        const fileList = Array.from(files);
        const loadedUrls = [];
        let loadedCount = 0;

        fileList.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            loadedUrls.push(event.target.result);
            loadedCount++;
            if (loadedCount === fileList.length) {
              setCurrentPool(prev => [...loadedUrls, ...prev]);
              triggerSuccessToast("📸 ローカル写真を" + fileList.length + "枚追加しました！");
            }
          };
          reader.readAsDataURL(file);
        });
      };

      // Google フォトから一括で取り込むアクション (アカウントからダウンロードした画像をドラッグ、または一括追加)
      const handleGooglePhotosSelect = (e) => {
        const files = e.target.files;
        if (!files) return;
        const fileList = Array.from(files);
        const loadedUrls = [];
        let loadedCount = 0;

        fileList.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            loadedUrls.push(event.target.result);
            loadedCount++;
            if (loadedCount === fileList.length) {
              setCurrentPool(prev => [...loadedUrls, ...prev]);
              triggerSuccessToast("🔵 Google フォトから" + fileList.length + "枚の写真を取り込みました！");

          };
          reader.readAsDataURL(file);

      // Amazon Photosから一括で取り込むアクション
      const handleAmazonPhotosSelect = (e) => {
        const files = e.target.files;
        if (!files) return;
        const fileList = Array.from(files);
        const loadedUrls = [];
        let loadedCount = 0;

        fileList.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            loadedUrls.push(event.target.result);
            loadedCount++;
            if (loadedCount === fileList.length) {
              setCurrentPool(prev => [...loadedUrls, ...prev]);
              triggerSuccessToast("🔶 Amazon Photosから" + fileList.length + "枚の写真を取り込みました！");
            }
          };
          reader.readAsDataURL(file);
        });
      };

      const handleExportPNG = async () => {
        setIsLoading(true);
        try {
          const loadPromises = frames.map(frame => loadFrameImage(frame));
          const loadedResults = await Promise.all(loadPromises);
          const imageMap = new Map();
          loadedResults.forEach(res => {
            if (res.img) imageMap.set(res.frameId, res.img);
          });

          const canvas = document.createElement('canvas');
          let canvasWidth = 1200;
          let canvasHeight = 1200;
          if (canvasAspectRatio === '3:4') {
            canvasWidth = 1200; canvasHeight = 1600;
          } else if (canvasAspectRatio === '4:3') {
            canvasWidth = 1600; canvasHeight = 1200;
          } else if (canvasAspectRatio === '16:9') {
            canvasWidth = 1600; canvasHeight = 900;
          } else if (canvasAspectRatio === '9:16') {
            canvasWidth = 900; canvasHeight = 1600;
          }

          canvas.width = canvasWidth;
          canvas.height = canvasHeight;
          const ctx = canvas.getContext('2d');
          if (!ctx) throw new Error();

          ctx.fillStyle = canvasBg;
          ctx.fillRect(0, 0, canvasWidth, canvasHeight);

          const pad = canvasWidth * 0.05;
          const drawWidth = canvasWidth - pad * 2;
          const drawHeight = canvasHeight - pad * 2;

          frames.forEach(frame => {
            const fx = pad + (frame.x / 100) * drawWidth;
            const fy = pad + (frame.y / 100) * drawHeight;
            const fRefWidth = (frame.width / 100) * drawWidth;
            const fRefHeight = (frame.height / 100) * drawHeight;
            const img = imageMap.get(frame.id);

            ctx.save();
            ctx.beginPath();
            const radius = 3;
            ctx.moveTo(fx + radius, fy);
            ctx.arcTo(fx + fRefWidth, fy, fx + fRefWidth, fy + fRefHeight, radius);
            ctx.arcTo(fx + fRefWidth, fy + fRefHeight, fx, fy + fRefHeight, radius);
            ctx.arcTo(fx, fy + fRefHeight, fx, fy, radius);
            ctx.arcTo(fx, fy, fx + fRefWidth, fy, radius);
            ctx.closePath();
            ctx.clip();

            if (img) {
              const imgAspect = img.width / img.height;
              const frameAspect = fRefWidth / fRefHeight;
              let sx = 0, sy = 0, sw = img.width, sh = img.height;
              if (imgAspect > frameAspect) {
                sw = img.height * frameAspect;
                sx = (img.width - sw) / 2;
              } else {
                sh = img.width / frameAspect;
                sy = (img.height - sh) / 2;
              }
              ctx.drawImage(img, sx, sy, sw, sh, fx, fy, fRefWidth, fRefHeight);
            } else {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
              ctx.fillRect(fx, fy, fRefWidth, fRefHeight);
              ctx.strokeStyle = 'rgba(0,0,0,0.1)';
              ctx.lineWidth = 1;
              ctx.strokeRect(fx, fy, fRefWidth, fRefHeight);
            }
            ctx.restore();
          });

          const dataUrl = canvas.toDataURL('image/png');
          const link = document.createElement('a');
          link.download = "mosaic-photo-" + Date.now() + ".png";
          link.href = dataUrl;
          link.click();
          triggerSuccessToast("📸 完成した高品質なモザイクフォトをPNG画像として書き出しました！");
        } catch (err) {
          triggerSuccessToast("❌ 画像の出力中にエラーが発生しました。");
        } finally {
          setIsLoading(false);
        }
      };

            <div className="flex items-center gap-3">

                      {/* 2. Google フォトから一括選択 */}
                      <div className="bg-gradient-to-br from-blue-50 to-indigo-50 border border-blue-200 rounded-lg p-2.5 space-y-2">
                        <div className="flex items-center gap-1.5 text-blue-700 font-bold text-[11px]">

                        <label

                        <label

              </div>

              {/* Canvas viewport container */}
              <div className="flex-1 flex items-center justify-center py-4 w-full relative z-10 select-none animate-fadeIn" style={{ minHeight: '380px' }}>
                <div
                  className="rounded-2xl shadow-xl transition-all relative overflow-hidden flex flex-wrap border border-slate-200/50"
                  style={{
                    backgroundColor: canvasBg,
                    width: (canvasAspectRatio === '1:1' || canvasAspectRatio === '3:4' || canvasAspectRatio === '9:16') ? '430px' : '520px',
                    aspectRatio: canvasAspectRatio === '1:1' ? '1' : canvasAspectRatio === '3:4' ? '3/4' : canvasAspectRatio === '4:3' ? '4/3' : canvasAspectRatio === '16:9' ? '16/9' : '9/16',
                    transform: 'scale(' + (zoomLevel / 100) + ')'
                  }}
                  onDragOver={(e) => e.preventDefault()}
                >
                  {isLoading && (
                    <div className="absolute inset-0 bg-white/70 backdrop-blur-xs flex items-center justify-center z-50">
                      <div className="flex flex-col items-center gap-2">
                        <span className="w-6 h-6 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></span>
                        <span className="text-[10px] text-slate-500 font-bold tracking-tight">等高線レイアウトを計算中...</span>
                      </div>
                    </div>
                  )}

                  {/* Render frames */}
                  {frames.map((frame) => {
                    const isSelected = selectedFrameId === frame.id;
                    const isHovered = hoveredFrameId === frame.id;

                    return (
                      <div
                        key={frame.id}
                        onDragOver={(e) => { e.preventDefault(); setHoveredFrameId(frame.id); }}
                        onDragLeave={() => setHoveredFrameId(null)}
                        onDrop={(e) => {
                          e.preventDefault();
                          setHoveredFrameId(null);
                          const url = e.dataTransfer.getData('text/plain');
                          if (url) {
                            setFrames(prev => prev.map(f => f.id === frame.id ? { ...f, imageUrl: url } : f));
                          }
                        }}
                        onClick={() => setSelectedFrameId(frame.id === selectedFrameId ? null : frame.id)}
                        className={'absolute cursor-pointer transition-all duration-150 overflow-hidden group ' + (layoutStyle === 'CIRCLE' ? 'rounded-full' : 'rounded')}
                        style={{
                          left: frame.x + '%',
                          top: frame.y + '%',
                          width: frame.width + '%',
                          height: frame.height + '%',
                          backgroundColor: frame.imageUrl ? 'transparent' : 'rgba(255, 255, 255, 0.45)',
                          border: isSelected ? '2px solid #6366f1' : isHovered ? '2px solid #3b82f6' : '1px solid rgba(0,0,0,0.1)',
                          boxShadow: isHovered ? '0 0 8px rgba(99,102,241,0.3)' : 'none'
                        }}
                      >
                        {frame.imageUrl ? (
                          <img src={frame.imageUrl} className="w-full h-full object-cover pointer-events-none" />
                        ) : (
                          <div className="w-full h-full flex items-center justify-center text-[7.5px] text-slate-400 font-bold opacity-60">
                            +
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Bot tutorial banner inside single HTML */}
              <div className="w-full max-w-2xl bg-white border border-slate-200 rounded-xl p-4 flex gap-3 text-xs text-slate-600 relative z-10 font-sans shadow-sm">
                <div className="w-6 h-6 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold shrink-0 mt-0.5">💡</div>
                <div className="flex-1 space-y-1">
                  <div className="flex justify-between items-center">
                    <span className="font-bold text-slate-800">インタラクティブ設計チュートリアル (ステップ {tutorialStep}/3)</span>
                    <div className="flex items-center gap-1.5">
                      {tutorialStep > 1 && <button onClick={() => setTutorialStep(tutorialStep - 1)} className="text-[10px] text-slate-500 bg-slate-100 p-0.5 px-1.5 rounded cursor-pointer">戻る</button>}
                      {tutorialStep < 3 ? <button onClick={() => setTutorialStep(tutorialStep + 1)} className="text-[10px] bg-indigo-50 text-indigo-600 font-bold p-0.5 px-1.5 rounded cursor-pointer">次へ →</button> : <button onClick={() => setTutorialStep(1)} className="text-[10px] bg-indigo-100 text-indigo-700 p-0.5 px-1.5 rounded cursor-pointer">最初から読む</button>}
                    </div>
                  </div>
                  <div className="mt-1">
                    {tutorialStep === 1 && <p className="text-[11px] text-slate-500 leading-normal">1. 「写真アップロード」機能またはGoogle/Amazonインポーターを使うことで、お手持ちの写真（複数可）から簡単に追加できます。</p>}
                    {tutorialStep === 2 && <p className="text-[11px] text-slate-500 leading-normal">2. 「一括自動挿入」を押すと、すべてのグレー枠へ自動的に写真が一発で流し込まれます。</p>}
                    {tutorialStep === 3 && <p className="text-[11px] text-slate-500 leading-normal">3. 「一括シャッフル」を使うことで、配置済みの写真を瞬時にランダムに並び替えできます。</p>}
                  </div>
                </div>
              </div>
            </main>
          </div>

          {/* Toast Notification Container */}
          {successMessage && (
            <div className="fixed top-4 right-4 z-50 bg-slate-900 border border-slate-800 text-white font-semibold text-xs py-2.5 px-4 rounded-xl shadow-2xl animate-bounce flex items-center gap-2">
              <Icon name="check" className="w-4 h-4 text-emerald-400" />
              <span>{successMessage}</span>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
